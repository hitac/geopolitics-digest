<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>デイリーダイジェスト 2026-06-21 | 国際情勢ダイジェスト</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f0f2f5;--white:#fff;--text:#1a1a1a;--muted:#6c757d;--border:#e0e4e8;--r:8px;--sh:0 1px 3px rgba(0,0,0,.08);--shm:0 4px 12px rgba(0,0,0,.12)}
body{font-family:'Segoe UI',Meiryo,'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);line-height:1.65}
#hd{background:var(--white);border-bottom:1px solid var(--border);height:52px;padding:0 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:var(--sh)}
.logo{font-weight:700;font-size:.85em;color:#1565c0;white-space:nowrap}
#hd nav{margin-left:auto;display:flex;gap:6px}
.nb{font-size:.78em;color:#1565c0;text-decoration:none;border:1px solid #bbdefb;padding:4px 12px;border-radius:20px;background:#e3f2fd;white-space:nowrap;transition:background .15s}
.nb:hover{background:#bbdefb}
.hero{background:linear-gradient(135deg,#1a237e 0%,#283593 60%,#3949ab 100%);color:#fff;padding:28px 20px}
.hero-in{max-width:860px;margin:0 auto}
.hero-date{display:inline-block;background:rgba(255,255,255,.2);font-size:.78em;font-weight:700;padding:3px 12px;border-radius:4px;margin-bottom:10px;border:1px solid rgba(255,255,255,.35)}
.hero h1{font-size:1.5em;margin-bottom:10px;font-weight:800}
.hero-stats{display:flex;gap:16px;flex-wrap:wrap}
.stat{font-size:.82em;opacity:.92;display:flex;align-items:center;gap:5px}
.stat strong{font-weight:700}
main{max-width:860px;margin:0 auto;padding:24px 16px 60px}
.sec{margin-bottom:40px}
.sec-hd{display:flex;align-items:center;gap:8px;margin-bottom:14px;padding:6px 12px;border-radius:6px;font-size:.95em;font-weight:700}
.art{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;margin-bottom:12px;box-shadow:var(--sh)}
.art:hover{box-shadow:var(--shm)}
.art-ttl{font-size:.95em;font-weight:700;margin-bottom:6px;line-height:1.4}
.art-ttl a{text-decoration:none}
.art-ttl a:hover{text-decoration:underline}
.art-meta{font-size:.75em;color:var(--muted);margin-bottom:12px;display:flex;gap:10px;flex-wrap:wrap}
.art-body h2{font-size:.87em;margin:12px 0 4px;padding-left:6px;border-left:2px solid #90caf9;color:#1565c0}
.art-body h3{font-size:.83em;color:#1976d2;margin:10px 0 3px}
.art-body p,.art-body li{font-size:.85em;line-height:1.6}
.art-body ul{padding-left:1.4em;margin:4px 0}
.art-body li{margin:3px 0}
.art-body strong{font-weight:700}
.stars{display:inline-flex;gap:2px;cursor:pointer;user-select:none;margin-top:6px}
.star{font-size:1em;color:#d1d5db;transition:color .1s;padding:0 1px;line-height:1}
.star.on{color:#f59e0b}
.exp-btn{cursor:pointer;font:inherit;background:#fff8e1;border-color:#ffe082;color:#f57f17}
.exp-btn:hover{background:#fff3cd}
.art-ft{padding:8px 0 0;border-top:1px solid var(--border);margin-top:10px}
</style>
</head>
<body>
<div id="hd">
  <span class="logo">🌐 国際情勢ダイジェスト</span>
  <nav><a class="nb" href="../index.html">📋 バックナンバー</a><button class="nb exp-btn" onclick="exportRatings()">⭐ 評価エクスポート</button></nav>
</div>
<div class="hero">
  <div class="hero-in">
    <div class="hero-date">📅 2026-06-21</div>
    <h1>デイリーダイジェスト</h1>
    <div class="hero-stats"><div class="stat">📰 記事 <strong>1 件</strong></div></div>
  </div>
</div>
<main><div class="sec"><div class="sec-hd" style="background:#f3e5f5;border:1px solid #e1bee7;color:#6a1b9a">🎬 映画・映像芸術</div><div class="art"><div class="art-ttl"><a href="https://www.indiewire.com/features/interviews/the-death-of-robin-hood-real-movie-based-on-1235201336/" target="_blank" style="color:#6a1b9a">‘The Death of Robin Hood’: What’s Historically Accurate in This Violent Revisionist Tale?</a></div><div class="art-meta"><span>IndieWire</span><span>📅 2026年6月21日 03:00 UTC</span></div><div class="art-body"><p style="color:#999;font-size:.82em;font-style:italic">（要約を取得できませんでした。元記事をご参照ください）</p></div><div class="art-ft"><div class="stars" data-url="https://www.indiewire.com/features/interviews/the-death-of-robin-hood-real-movie-based-on-1235201336/" data-title="‘The Death of Robin Hood’: What’s Historically Accurate in This Violent Revision" data-src="IndieWire" data-date="2026-06-21"><span class="star" data-n="1">★</span><span class="star" data-n="2">★</span><span class="star" data-n="3">★</span><span class="star" data-n="4">★</span><span class="star" data-n="5">★</span></div></div></div>
</div>
</main>
<script>
const _RK='digest_ratings';
function _lr(){try{return JSON.parse(localStorage.getItem(_RK)||'{}')}catch(e){return{}}}
function _sv(url,r,t,s,d){const m=_lr();if(r===0)delete m[url];else m[url]={rating:r,title:(t||'').substring(0,80),source:s,date:d};localStorage.setItem(_RK,JSON.stringify(m))}
function _us(el,n){el.querySelectorAll('.star').forEach(s=>{s.classList.toggle('on',parseInt(s.dataset.n)<=n)})}
function initStars(){
  const m=_lr();
  document.querySelectorAll('.stars').forEach(el=>{
    const url=el.dataset.url;
    if(m[url])_us(el,m[url].rating);
    el.addEventListener('mouseleave',()=>_us(el,(m[url]||{}).rating||0));
    el.querySelectorAll('.star').forEach(s=>{
      const n=parseInt(s.dataset.n);
      s.addEventListener('mouseenter',()=>_us(el,n));
      s.addEventListener('click',e=>{
        e.preventDefault();e.stopPropagation();
        const cur=(m[url]||{}).rating||0,nr=cur===n?0:n;
        _sv(url,nr,el.dataset.title,el.dataset.src,el.dataset.date);
        if(nr)m[url]={rating:nr};else delete m[url];
        _us(el,nr);
      });
    });
  });
}
function exportRatings(){
  const m=_lr(),cnt=Object.keys(m).length;
  if(!cnt){alert('評価データがありません。★を付けてからエクスポートしてください。');return;}
  const blob=new Blob([JSON.stringify(m,null,2)],{type:'application/json'});
  const u=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=u;a.download='ratings.json';document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(u);
  alert(cnt+'件の評価をエクスポートしました。scripts/ratings.json として保存してください。');
}
document.addEventListener('DOMContentLoaded',initStars);
</script>
</body>
</html>
